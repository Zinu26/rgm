<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Garden Memory</title>

<style>
/* ===== GLOBAL ===== */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
  background: #0b1b10;
  color: white;
}

/* ===== INTRO GARDEN ===== */
#intro {
  position: fixed;
  inset: 0;
  background: linear-gradient(#0b3d2e, #06130d);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  animation: fadeOut 3s ease 5s forwards;
}

.flower {
  width: 20px;
  height: 20px;
  background: pink;
  border-radius: 50%;
  position: absolute;
  animation: sway 3s infinite ease-in-out;
}

@keyframes sway {
  0%,100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-20px) rotate(10deg); }
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* butterflies */
.butterfly {
  position: absolute;
  width: 10px;
  height: 10px;
  background: yellow;
  border-radius: 50%;
  animation: fly 8s infinite linear;
}

@keyframes fly {
  0% { transform: translate(0,0); }
  50% { transform: translate(200px,-100px); }
  100% { transform: translate(-100px,50px); }
}

/* ===== SPLIT SCREEN ===== */
#split {
  display: none;
  height: 100vh;
  background: #123b2a;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#split.active {
  display: flex;
}

/* keypad */
.keypad {
  display: grid;
  grid-template-columns: repeat(3, 60px);
  gap: 10px;
}

.key {
  background: #1f5c40;
  padding: 20px;
  text-align: center;
  cursor: pointer;
  border-radius: 8px;
}

#display {
  margin-bottom: 20px;
  font-size: 24px;
}

/* ===== MENU ===== */
#menu {
  display: none;
  height: 100vh;
  background: #08140d;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.btn {
  padding: 15px 25px;
  margin: 10px;
  background: #2d7a55;
  cursor: pointer;
  border-radius: 10px;
}

/* ===== LETTER ===== */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
}

.envelope {
  width: 200px;
  height: 120px;
  background: white;
  position: relative;
  cursor: pointer;
}

.letter {
  display: none;
  background: white;
  color: black;
  padding: 20px;
  margin-top: 10px;
}

/* ===== FLOWER ===== */
.bouquet {
  display: flex;
  gap: 10px;
  cursor: pointer;
}

/* ===== ROADTRIP ===== */
#roadtrip {
  display: none;
  padding: 20px;
}

.motorcycle {
  width: 100px;
  height: 50px;
  background: red;
  margin: 20px;
  animation: moveBike 4s infinite alternate;
}

@keyframes moveBike {
  from { transform: translateX(0); }
  to { transform: translateX(200px); }
}

.popup {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}
</style>
</head>

<body>

<!-- ===== INTRO ===== -->
<div id="intro">
  <h1>Welcome to Our Garden</h1>

  <script>
    for (let i=0;i<30;i++){
      let f=document.createElement("div");
      f.className="flower";
      f.style.left=Math.random()*100+"vw";
      f.style.top=Math.random()*100+"vh";
      document.write(f.outerHTML);
    }
  </script>

  <div class="butterfly"></div>
</div>

<!-- ===== PASSCODE ===== -->
<div id="split">
  <div id="display"></div>

  <div class="keypad">
    <div class="key" onclick="press(1)">1</div>
    <div class="key" onclick="press(2)">2</div>
    <div class="key" onclick="press(3)">3</div>
    <div class="key" onclick="press(4)">4</div>
    <div class="key" onclick="press(5)">5</div>
    <div class="key" onclick="press(6)">6</div>
    <div class="key" onclick="press(7)">7</div>
    <div class="key" onclick="press(8)">8</div>
    <div class="key" onclick="press(9)">9</div>
    <div class="key" onclick="clearCode()">C</div>
    <div class="key" onclick="press(0)">0</div>
    <div class="key" onclick="check()">OK</div>
  </div>

  <p id="hint"></p>
</div>

<!-- ===== MENU ===== -->
<div id="menu">
  <div class="btn" onclick="openLetter()">Letter</div>
  <div class="btn" onclick="openFlower()">Flower</div>
  <div class="btn" onclick="openRoadtrip()">Roadtrip</div>
</div>

<!-- ===== LETTER ===== -->
<div class="modal" id="letterModal">
  <div onclick="openLetterContent()" class="envelope">💌 Click envelope</div>
  <div class="letter" id="letterContent">
    Click again to unfold love letter ❤️
  </div>
</div>

<!-- ===== FLOWER ===== -->
<div class="modal" id="flowerModal">
  <div class="bouquet" onclick="alert('Flowers are blooming 🌸')">
    🌸🌸🌸🌸🌸
  </div>
</div>

<!-- ===== ROADTRIP ===== -->
<div id="roadtrip">
  <div class="motorcycle"></div>
  <button onclick="nextStop()">Next Stop</button>
</div>

<div class="popup" id="popup"></div>

<script>
let code = "";

/* ===== PASSCODE ===== */
function press(n){
  code += n;
  document.getElementById("display").innerText = code;
}

function clearCode(){
  code = "";
  document.getElementById("display").innerText = "";
}

function check(){
  if(code === "0321"){
    document.getElementById("split").style.display="none";
    document.getElementById("menu").style.display="flex";
  } else {
    document.getElementById("hint").innerText =
    "Our special day at Mt. Ulap";
    clearCode();
  }
}

/* show split after intro */
setTimeout(()=>{
  document.getElementById("split").classList.add("active");
}, 5000);

/* ===== LETTER ===== */
function openLetter(){
  document.getElementById("letterModal").style.display="flex";
}
function openLetterContent(){
  document.getElementById("letterContent").style.display="block";
}

/* ===== FLOWER ===== */
function openFlower(){
  document.getElementById("flowerModal").style.display="flex";
}

/* ===== ROADTRIP ===== */
function openRoadtrip(){
  document.getElementById("roadtrip").style.display="block";
}

let stops = [
  "First message / memory here",
  "Starbucks Antipolo",
  "Office Building",
  "Next location..."
  // EXTEND THIS LIST TO 50 STOPS
];

let index = 0;

function nextStop(){
  if(index >= stops.length) return;

  document.getElementById("popup").style.display="flex";
  document.getElementById("popup").innerHTML =
    "<h2>" + stops[index] + "</h2><button onclick='closePopup()'>Next</button>";
}

function closePopup(){
  document.getElementById("popup").style.display="none";
  index++;
}
</script>

</body>
</html>
