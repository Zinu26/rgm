<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Secret Garden</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b3d2e;
  overflow-x: hidden;
  color: white;
}

/* ---------- INTRO FLOWER GARDEN ---------- */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(#0b3d2e, #145c43);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.flower {
  width: 20px;
  height: 20px;
  background: pink;
  border-radius: 50%;
  position: absolute;
  animation: sway 3s infinite ease-in-out;
}

@keyframes sway {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(10px); }
}

.butterfly {
  position: absolute;
  width: 15px;
  height: 15px;
  background: yellow;
  border-radius: 50%;
  animation: fly 6s linear infinite;
}

@keyframes fly {
  0% { transform: translateX(-100px) translateY(0); }
  100% { transform: translateX(120vw) translateY(-200px); }
}

/* ---------- SPLIT TRANSITION ---------- */
.split {
  position: fixed;
  width: 100%;
  height: 100%;
  display: flex;
  top: 0;
  left: 0;
  z-index: 10;
  pointer-events: none;
}

.split div {
  width: 50%;
  background: #0b3d2e;
  transition: transform 1.5s ease;
}

.split.active .left { transform: translateX(-100%); }
.split.active .right { transform: translateX(100%); }

/* ---------- PASSCODE ---------- */
#lockscreen {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: #123;
}

.keypad button {
  font-size: 20px;
  margin: 5px;
  padding: 15px;
}

/* ---------- MENU ---------- */
#menu {
  display: none;
  text-align: center;
  padding-top: 50px;
}

.card {
  margin: 20px;
  padding: 20px;
  background: rgba(255,255,255,0.1);
  display: inline-block;
  cursor: pointer;
}

/* ---------- LETTER ---------- */
#letterPage, #flowerPage, #ridePage {
  display: none;
  padding: 30px;
}

/* envelope */
.envelope {
  width: 200px;
  height: 120px;
  background: #e0c097;
  position: relative;
  margin: auto;
  cursor: pointer;
}

.letter {
  width: 180px;
  height: 200px;
  background: white;
  margin: auto;
  transform: scaleY(0);
  transition: 1s;
  color: black;
  padding: 10px;
}

/* bouquet */
.bouquet {
  width: 200px;
  height: 200px;
  margin: auto;
  background: pink;
  border-radius: 50%;
  cursor: pointer;
  transition: transform 1s;
}

.bouquet:hover {
  transform: scale(1.1);
}

/* roadtrip */
.car {
  font-size: 40px;
  position: relative;
  animation: drive 3s infinite alternate;
}

@keyframes drive {
  from { transform: translateX(0); }
  to { transform: translateX(100px); }
}

.popup {
  background: rgba(0,0,0,0.8);
  padding: 20px;
  position: fixed;
  top: 20%;
  left: 20%;
  width: 60%;
  display: none;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <h1>Secret Garden</h1>
</div>

<div class="split" id="split">
  <div class="left"></div>
  <div class="right"></div>
</div>

<!-- LOCK -->
<div id="lockscreen">
  <h2>Enter Passcode</h2>
  <input id="code" maxlength="4" readonly />
  <div class="keypad">
    <button onclick="press(1)">1</button>
    <button onclick="press(2)">2</button>
    <button onclick="press(3)">3</button>
    <button onclick="press(4)">4</button><br/>
    <button onclick="press(5)">5</button>
    <button onclick="press(6)">6</button>
    <button onclick="press(7)">7</button><br/>
    <button onclick="press(8)">8</button>
    <button onclick="press(9)">9</button>
    <button onclick="press(0)">0</button>
  </div>
  <button onclick="checkCode()">Enter</button>
  <p id="hint"></p>
</div>

<!-- MENU -->
<div id="menu">
  <h1>Choose</h1>
  <div class="card" onclick="openLetter()">Letter</div>
  <div class="card" onclick="openFlower()">Flower</div>
  <div class="card" onclick="openRide()">Roadtrip</div>
</div>

<!-- LETTER -->
<div id="letterPage">
  <div class="envelope" onclick="openEnvelope()"></div>
  <div class="letter" id="letter">
    Click to unfold love letter ❤️
  </div>
</div>

<!-- FLOWER -->
<div id="flowerPage">
  <h3>A bouquet for you 🌸</h3>
  <div class="bouquet" onclick="alert('You make everything bloom.')"></div>
</div>

<!-- ROADTRIP -->
<div id="ridePage">
  <h2>Roadtrip Adventure 🏍️</h2>
  <div class="car">🏍️👦👧</div>
  <button onclick="startTrip()">Start Trip</button>
</div>

<div class="popup" id="popup">
  <p id="popupText"></p>
  <button onclick="nextStop()">Next</button>
</div>

<script>
let input = "";
let stopIndex = 0;

function press(n){
  if(input.length < 4){
    input += n;
    document.getElementById("code").value = input;
  }
}

function checkCode(){
  if(input === "0321"){
    document.getElementById("split").classList.add("active");
    setTimeout(()=>{
      document.getElementById("lockscreen").style.display = "none";
      document.getElementById("menu").style.display = "block";
    },1500);
  } else {
    document.getElementById("hint").innerText =
    "Our special day at Mt. Ulap";
    input = "";
    document.getElementById("code").value = "";
  }
}

/* INTRO FLOW */
setTimeout(()=>{
  document.getElementById("intro").style.display="none";
  document.getElementById("split").classList.add("active");
  setTimeout(()=>{
    document.getElementById("lockscreen").style.display="flex";
  },1000);
},2000);

/* LETTER */
function openLetter(){
  document.getElementById("menu").style.display="none";
  document.getElementById("letterPage").style.display="block";
}

function openEnvelope(){
  document.getElementById("letter").style.transform="scaleY(1)";
}

/* FLOWER */
function openFlower(){
  document.getElementById("menu").style.display="none";
  document.getElementById("flowerPage").style.display="block";
}

/* ROADTRIP */
let stops = Array.from({length:50}, (_,i)=>"Stop "+(i+1)+": Memory " + (i+1));

function openRide(){
  document.getElementById("menu").style.display="none";
  document.getElementById("ridePage").style.display="block";
}

function startTrip(){
  stopIndex = 0;
  showPopup();
}

function showPopup(){
  document.getElementById("popup").style.display="block";
  document.getElementById("popupText").innerText =
    stops[stopIndex];
}

function nextStop(){
  stopIndex++;
  if(stopIndex < stops.length){
    showPopup();
  } else {
    document.getElementById("popupText").innerText =
    "End of Journey ❤️";
  }
}
</script>

</body>
</html>
