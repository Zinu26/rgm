<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Secret Garden</title>

<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; overflow:hidden; font-family:"Segoe UI",system-ui,sans-serif; }

  /* ---------- garden background ---------- */
  .garden { position:fixed; inset:0; transition:opacity 1s;
    background:
      radial-gradient(circle at 80% 16%, #fff7c2 0 5%, #fff7c233 6%, transparent 9%),
      linear-gradient(#9bdcff 0%, #cdeffb 36%, #bde6a0 50%, #5aa83c 62%, #3c7d2a 100%);
  }

  .ground {
    position:fixed; left:0; right:0; bottom:0; height:34vh;
    display:flex; align-items:flex-end; justify-content:space-around;
    padding:0 4vw;
  }

  /* ---------- flower ---------- */
  .flower {
    width:1em; height:1em; border-radius:50%; position:relative;
    background:
      radial-gradient(circle at 50% 26%, var(--pl) 0 6%, var(--p) 7% 17%, transparent 18%),
      radial-gradient(circle at 73% 43%, var(--pl) 0 6%, var(--p) 7% 17%, transparent 18%),
      radial-gradient(circle at 64% 69%, var(--pl) 0 6%, var(--p) 7% 17%, transparent 18%),
      radial-gradient(circle at 36% 69%, var(--pl) 0 6%, var(--p) 7% 17%, transparent 18%),
      radial-gradient(circle at 27% 43%, var(--pl) 0 6%, var(--p) 7% 17%, transparent 18%),
      radial-gradient(circle at 50% 50%, #ffe08a 0 9%, #f3ad33 10% 15%, transparent 16%);
  }

  .plant {
    display:flex; flex-direction:column; align-items:center;
    animation:sway 4s ease-in-out infinite;
  }

  .stem {
    width:8px; height:18vh;
    background:linear-gradient(#5cae3e,#2f6b22);
    border-radius:6px;
  }

  @keyframes sway {
    0%,100%{transform:rotate(-6deg);}
    50%{transform:rotate(6deg);}
  }

  /* ---------- butterflies ---------- */
  .bfly {
    position:fixed; width:60px; height:54px;
    animation:fly linear infinite;
  }

  @keyframes fly {
    0% { transform:translate(-10vw,70vh); }
    50% { transform:translate(60vw,30vh); }
    100% { transform:translate(110vw,60vh); }
  }

  /* ---------- gate ---------- */
  .gate {
    position:fixed; inset:0; display:flex;
    justify-content:center; align-items:center;
    opacity:0; transition:.8s;
  }

  body.open .gate { opacity:1; }

  body.unlocked .garden,
  body.unlocked .ground {
    opacity:0; pointer-events:none;
  }

  body.unlocked .scene { opacity:1; pointer-events:auto; }

  .pad {
    background:#fff; padding:24px;
    border-radius:20px; width:300px;
    text-align:center;
  }

  .keys {
    display:grid; grid-template-columns:repeat(3,1fr);
    gap:8px; margin-top:10px;
  }

  .keys button {
    padding:14px; font-size:18px;
  }

  .msg { margin-top:10px; color:#2f6b2a; }

  /* ---------- scene menu ---------- */
  .scene {
    position:fixed; inset:0;
    display:flex; flex-direction:column;
    justify-content:center; align-items:center;
    gap:20px;
    opacity:0;
    transition:.8s;
    background:linear-gradient(#ffd9a8,#ffb7c5);
  }

  .gifts {
    display:flex; gap:20px;
  }

  .gift {
    padding:20px; background:#fff;
    border-radius:15px; cursor:pointer;
  }

  /* ---------- modal ---------- */
  .modal {
    position:fixed; inset:0;
    display:none;
    background:rgba(0,0,0,.7);
    justify-content:center;
    align-items:center;
  }

  .modal.show { display:flex; }

  /* ---------- envelope ---------- */
  .envelope {
    width:300px; height:200px;
    background:#e8a4c4;
    padding:20px;
    cursor:pointer;
  }

  .paper {
    background:#fff;
    padding:10px;
    margin-top:10px;
    display:none;
  }

  .envelope.open .paper { display:block; }

  /* ---------- flower ---------- */
  .bouquet { font-size:60px; cursor:pointer; }

  /* ---------- roadtrip ---------- */
  .road {
    width:90vw; height:300px;
    background:#222;
    color:#fff;
    position:relative;
    overflow:hidden;
  }

  .moto {
    position:absolute;
    bottom:40px;
    left:0;
    transition:2s;
  }

  .popup {
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.8);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:#fff;
  }

  .popup.show { display:flex; }
</style>
</head>

<body>

<div class="garden"></div>
<div class="ground" id="ground"></div>

<!-- GATE -->
<div class="gate">
  <div class="pad">
    <h3>Enter Code</h3>
    <div id="display"></div>

    <div class="keys" id="keys">
      <button>1</button><button>2</button><button>3</button>
      <button>4</button><button>5</button><button>6</button>
      <button>7</button><button>8</button><button>9</button>
      <button data-act="clear">C</button>
      <button>0</button>
      <button data-act="enter">OK</button>
    </div>

    <div class="msg" id="msg"></div>
  </div>
</div>

<!-- MENU -->
<div class="scene">
  <h2>Choose One 💗</h2>
  <div class="gifts">
    <div class="gift" onclick="openLetter()">Letter</div>
    <div class="gift" onclick="openFlower()">Flower</div>
    <div class="gift" onclick="openRoad()">Roadtrip</div>
  </div>
</div>

<!-- LETTER -->
<div class="modal" id="letter">
  <div class="envelope" onclick="this.classList.toggle('open')">
    💌 Click to open
    <div class="paper">
      My love ❤️<br><br>
      Thank you for everything.<br>
      You are my favorite place.
    </div>
  </div>
</div>

<!-- FLOWER -->
<div class="modal" id="flower">
  <div class="bouquet" onclick="alert('You are my flower 🌸')">
    🌸🌸🌸🌸🌸
  </div>
</div>

<!-- ROAD -->
<div class="modal" id="road">
  <div class="road">
    <div class="moto" id="moto">🏍️</div>

    <div class="popup" id="popup">
      <h2 id="stopTitle"></h2>
      <p id="stopText"></p>
      <button onclick="nextStop()">Next</button>
    </div>
  </div>
</div>

<script>
let code = "";
const correct = "0321";

/* garden flowers */
for(let i=0;i<10;i++){
  let p=document.createElement("div");
  p.className="plant";
  p.innerHTML=`🌸<div class="stem"></div>`;
  ground.appendChild(p);
}

/* butterflies */
for(let i=0;i<3;i++){
  let b=document.createElement("div");
  b.className="bfly";
  b.style.animationDuration = (10+i*2)+"s";
  document.body.appendChild(b);
}

/* open gate */
setTimeout(()=>document.body.classList.add("open"),3000);

/* keypad */
keys.onclick = e=>{
  let b=e.target;
  if(!b.tagName) return;

  if(b.dataset.act==="clear"){
    code="";
  }
  else if(b.dataset.act==="enter"){
    check();
  }
  else{
    code += b.textContent;
  }
  display.textContent = code;
}

function check(){
  if(code===correct){
    document.body.classList.add("unlocked");
  } else {
    msg.textContent = "Our special day in Mt. Ulap";
    code="";
  }
}

/* menu */
function openLetter(){ letter.classList.add("show"); }
function openFlower(){ flower.classList.add("show"); }
function openRoad(){ road.classList.add("show"); }

/* ROAD TRIP */
const stops = [
  {t:"First Chat", d:"Where it all began"},
  {t:"Starbucks Antipolo", d:"Coffee date ☕"},
  {t:"Office", d:"Random stop"},
  {t:"Next stop", d:"More memories"}
];

let i=0;

function startRoad(){
  i=0;
  move();
}

function move(){
  popup.classList.remove("show");
  moto.style.left = (i*20)+"%";

  setTimeout(()=>{
    showStop();
  },2000);
}

function showStop(){
  popup.classList.add("show");
  stopTitle.textContent = stops[i].t;
  stopText.textContent = stops[i].d;
}

function nextStop(){
  i++;
  if(i<stops.length){
    move();
  } else {
    popup.innerHTML = "<h2>End of Journey 💗</h2>";
  }
}
</script>

</body>
</html>
