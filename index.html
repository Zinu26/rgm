<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Special Garden</title>
    <style>
        /* --- General CSS --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Georgia', serif; /* A romantic font */
            background-color: #fce4ec; /* Light pink background */
        }

        /* --- Passcode Screen (Screen 1) --- */
        #passcode-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        /* The garden image split effect */
        .garden-half {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            /* REPLACE WITH YOUR GARDEN IMAGE */
            background-image: url('images/garden.jpg');
            background-size: cover;
            background-position: center;
            transition: transform 1s ease-in-out;
            z-index: 5;
        }

        #garden-left { left: 0; }
        #garden-right { right: 0; background-position: right center; }

        /* When the 'loaded' class is added, the halves split */
        .loaded #garden-left { transform: translateX(-100%); }
        .loaded #garden-right { transform: translateX(100%); }

        /* The passcode input UI */
        #passcode-container {
            position: relative;
            z-index: 6;
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: none; /* Initially hidden */
        }

        #passcode-container h2 { color: #880e4f; }
        
        #passcode-input {
            font-size: 24px;
            letter-spacing: 5px;
            text-align: center;
            width: 150px;
            border: 2px solid #880e4f;
            border-radius: 5px;
            padding: 5px;
        }

        #clue-message {
            color: #d81b60;
            font-style: italic;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }

        /* --- Main Menu (Screen 2) --- */
        #menu-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none; /* Hidden until correct passcode */
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #fce4ec, #e1f5fe);
            opacity: 0;
            transition: opacity 1s ease;
            flex-direction: column;
            z-index: 1;
        }

        .show-menu {
            display: flex !important;
            opacity: 1 !important;
        }

        .menu-options {
            display: flex;
            gap: 40px;
            margin-top: 50px;
        }

        .menu-btn {
            background-color: #880e4f;
            color: white;
            padding: 20px 40px;
            border: none;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        .menu-btn:hover { background-color: #ad1457; transform: scale(1.05); }

        /* --- Butterfly Animation CSS --- */
        .butterfly {
            position: absolute;
            width: 40px;
            height: 40px;
            /* REPLACE WITH YOUR BUTTERFLY IMAGE */
            background-image: url('images/butterfly.png');
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.7;
            z-index: 20; /* Keep them above everything */
            animation: fly 10s infinite linear;
        }

        @keyframes fly {
            0% { transform: translate(-10%, 10vh) rotate(0deg); }
            25% { transform: translate(30vw, 30vh) rotate(20deg); }
            50% { transform: translate(60vw, 10vh) rotate(-15deg); }
            75% { transform: translate(90vw, 40vh) rotate(10deg); }
            100% { transform: translate(110vw, 20vh) rotate(0deg); }
        }

        /* Give butterflies unique paths */
        .bf1 { animation-delay: 0s; animation-duration: 12s; top: 10%; }
        .bf2 { animation-delay: 2s; animation-duration: 15s; top: 40%; }
        .bf3 { animation-delay: 4s; animation-duration: 10s; top: 70%; }

    </style>
</head>
<body>

    <!-- Butterflies -->
    <div class="butterfly bf1"></div>
    <div class="butterfly bf2"></div>
    <div class="butterfly bf3"></div>

    <!-- Screen 1: Passcode -->
    <div id="passcode-screen">
        <div id="garden-left" class="garden-half"></div>
        <div id="garden-right" class="garden-half"></div>

        <div id="passcode-container">
            <h2>Enter passcode</h2>
            <input type="text" id="passcode-input" maxlength="4" placeholder="....">
            <div id="clue-message">Clue: Our special day in Mt. Ulap</div>
        </div>
    </div>

    <!-- Screen 2: Main Menu -->
    <div id="menu-screen">
        <h1>Welcome, [Your Names Here]!</h1>
        <div class="menu-options">
            <button class="menu-btn" onclick="openModule('letter')">Letter</button>
            <button class="menu-btn" onclick="openModule('flower')">Flower</button>
            <button class="menu-btn" onclick="openModule('roadtrip')">Roadtrip</button>
        </div>
    </div>

    <script>
        // --- JavaScript for Step 1 ---

        // 1. Loading and Splitting
        window.addEventListener('load', () => {
            // Give a tiny delay before splitting
            setTimeout(() => {
                document.getElementById('passcode-screen').classList.add('loaded');
                document.getElementById('passcode-container').style.display = 'block';
            }, 1000); 
        });

        // 2. Passcode Verification
        const passcodeField = document.getElementById('passcode-input');
        const clueField = document.getElementById('clue-message');
        const correctPasscode = "0321";

        passcodeField.addEventListener('input', () => {
            if (passcodeField.value === correctPasscode) {
                // Correct Passcode -> Go to Menu
                document.getElementById('passcode-screen').style.display = 'none';
                document.getElementById('menu-screen').classList.add('show-menu');
            } else if (passcodeField.value.length === 4) {
                // Wrong Passcode (4 digits reached)
                clueField.style.display = 'block';
                passcodeField.value = ""; // Clear input
                passcodeField.style.borderColor = "#ff1744"; // Blink red
                setTimeout(() => passcodeField.style.borderColor = "#880e4f", 1000);
            }
        });

        // --- JavaScript needed to manage screens ---
        function openModule(module) {
            alert("You clicked " + module + ". This will open " + module + ".html!");
            // IN THE FINAL VERSION, USE: window.location.href = module + ".html";
        }
    </script>
</body>
</html>
