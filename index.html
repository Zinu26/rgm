<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Garden Story</title>
<style>
/* ================= GLOBAL ================= */
body,html{
  margin:0;
  padding:0;
  font-family:Arial;
  overflow:hidden;
  background:#0b1d14;
  color:white;
}

/* ================= INTRO GARDEN ================= */
#intro{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(#0b1d14,#123d2a);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.flower{
  position:absolute;
  width:20px;
  height:20px;
  background:pink;
  border-radius:50%;
  animation:sway 3s infinite ease-in-out;
}

@keyframes sway{
  0%{transform:translateY(0) rotate(0deg);}
  50%{transform:translateY(-10px) rotate(20deg);}
  100%{transform:translateY(0) rotate(0deg);}
}

.butterfly{
  position:absolute;
  width:20px;height:20px;
  background:yellow;
  border-radius:50%;
  animation:fly 8s linear infinite;
}

@keyframes fly{
  0%{left:-10%; top:50%;}
  100%{left:110%; top:20%;}
}

/* ================= SPLIT EFFECT ================= */
.split{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  pointer-events:none;
}

.left,.right{
  width:50%;
  height:100%;
  background:linear-gradient(#0b1d14,#1a4d35);
  transition:transform 1.5s ease;
}

.split.open .left{transform:translateX(-100%);}
.split.open .right{transform:translateX(100%);}

/* ================= PASSCODE ================= */
#lockScreen{
  position:fixed;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:#0a0f0c;
}

.keypad button{
  width:60px;
  height:60px;
  margin:5px;
  font-size:20px;
}

#display{
  font-size:30px;
  margin-bottom:10px;
}

/* ================= MENU ================= */
#menu{
  display:none;
  width:100%;
  height:100%;
  background:#102a1e;
  justify-content:center;
  align-items:center;
  gap:20px;
  flex-direction:column;
}

.card{
  padding:20px;
  background:#1f4d38;
  cursor:pointer;
}

/* ================= LETTER ================= */
#letterModal{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.envelope{
  width:120px;
  height:80px;
  background:white;
  position:relative;
  cursor:pointer;
}

.letter{
  width:200px;
  height:300px;
  background:white;
  color:black;
  margin-top:20px;
  display:none;
  padding:10px;
}

/* ================= FLOWER ================= */
#flowerModal{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:#0d2a1f;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* ================= ROADTRIP ================= */
#roadModal{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:#111;
}

#bike{
  position:absolute;
  bottom:20px;
  left:0;
  font-size:40px;
  transition:left 2s linear;
}

.popup{
  position:absolute;
  top:20%;
  left:30%;
  width:300px;
  background:white;
  color:black;
  padding:10px;
  display:none;
}
</style>
</head>

<body>

<!-- ================= INTRO ================= -->
<div id="intro"></div>

<div class="split" id="split">
  <div class="left"></div>
  <div class="right"></div>
</div>

<!-- ================= PASSCODE ================= -->
<div id="lockScreen">
  <div id="display"></div>
  <div class="keypad">
    <button onclick="press(1)">1</button>
    <button onclick="press(2)">2</button>
    <button onclick="press(3)">3</button><br>
    <button onclick="press(4)">4</button>
    <button onclick="press(5)">5</button>
    <button onclick="press(6)">6</button><br>
    <button onclick="press(7)">7</button>
    <button onclick="press(8)">8</button>
    <button onclick="press(9)">9</button><br>
    <button onclick="clearCode()">C</button>
    <button onclick="press(0)">0</button>
    <button onclick="check()">OK</button>
  </div>
  <p id="hint"></p>
</div>

<!-- ================= MENU ================= -->
<div id="menu">
  <div class="card" onclick="openLetter()">Letter</div>
  <div class="card" onclick="openFlower()">Flower</div>
  <div class="card" onclick="openRoad()">Roadtrip</div>
</div>

<!-- ================= LETTER ================= -->
<div id="letterModal">
  <div class="envelope" onclick="openLetterAnim()">📩</div>
  <div class="letter" id="letter">
    <h3>My Love Letter</h3>
    <p>You are my favorite journey, my calm, my home.</p>
  </div>
</div>

<!-- ================= FLOWER ================= -->
<div id="flowerModal">
  <h3>Mini Bouquet for You 🌸</h3>
  <div style="font-size:80px; cursor:pointer" onclick="alert('You touched the bouquet 💐')">💐</div>
</div>

<!-- ================= ROAD ================= -->
<div id="roadModal">
  <div id="bike">🏍️👦👧</div>
  <div class="popup" id="popup"></div>
</div>

<script>
/* ================= INTRO FLOWERS ================= */
const intro = document.getElementById("intro");

for(let i=0;i<30;i++){
  let f = document.createElement("div");
  f.className="flower";
  f.style.left=Math.random()*100+"%";
  f.style.top=Math.random()*100+"%";
  intro.appendChild(f);
}

for(let i=0;i<5;i++){
  let b=document.createElement("div");
  b.className="butterfly";
  b.style.top=Math.random()*100+"%";
  b.style.animationDuration=(5+Math.random()*5)+"s";
  intro.appendChild(b);
}

/* SPLIT AFTER LOAD */
setTimeout(()=>{
  document.getElementById("split").classList.add("open");
  setTimeout(()=>{
    document.getElementById("lockScreen").style.display="flex";
    intro.style.display="none";
  },1500);
},3000);

/* ================= PASSCODE ================= */
let code="";
function press(n){
  code+=n;
  document.getElementById("display").innerText=code;
}

function clearCode(){
  code="";
  document.getElementById("display").innerText="";
}

function check(){
  if(code==="0321"){
    document.getElementById("lockScreen").style.display="none";
    document.getElementById("menu").style.display="flex";
  }else{
    document.getElementById("hint").innerText="Our special day at Mt. Ulap";
    clearCode();
  }
}

/* ================= MENU ================= */
function openLetter(){
  document.getElementById("letterModal").style.display="flex";
}
function openFlower(){
  document.getElementById("flowerModal").style.display="flex";
}

/* ================= LETTER ANIM ================= */
function openLetterAnim(){
  document.getElementById("letter").style.display="block";
}

/* ================= ROADTRIP ================= */

const stops = Array.from({length:50}, (_,i)=>(
  i===0 ? "Start: Home" :
  i===1 ? "Starbucks Antipolo" :
  i===2 ? "Office Building Stop" :
  "Stop " + (i+1)
));

let currentStop=0;

function openRoad(){
  document.getElementById("roadModal").style.display="block";
  runTrip();
}

function runTrip(){
  const bike=document.getElementById("bike");
  const popup=document.getElementById("popup");

  function nextStop(){
    if(currentStop>=stops.length) return;

    popup.innerText=stops[currentStop];
    popup.style.display="block";

    setTimeout(()=>{
      popup.style.display="none";
      bike.style.left=(currentStop*2)+"%";
      currentStop++;
      setTimeout(nextStop,1500);
    },1500);
  }

  nextStop();
}
</script>

</body>
</html>
